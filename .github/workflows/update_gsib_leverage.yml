name: Update G-SIB market leverage

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 3 * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore source-data cache
        uses: actions/cache@v4
        with:
          path: .cache/source-data
          key: gsib-source-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            gsib-source-data-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch SEC balance sheets
        env:
          SEC_USER_AGENT: "iweigandi gsib-leverage research iweigandi@users.noreply.github.com"
        run: python scripts/fetch_sec_balance_sheets.py --write

      - name: Build market leverage series
        env:
          YF_REQUEST_SLEEP_SECONDS: "8"
          GSIB_USE_HISTORICAL_SHARES: "0"
        run: python gsib_leverage.py
      - name: Commit refreshed outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update G-SIB market leverage"
          file_pattern: "data/gsib_market_leverage.csv chart/gsib_market_leverage_decomposition.png source_data/*.csv scripts/*.py README.md SOURCES.md gsib_leverage.py requirements.txt"

